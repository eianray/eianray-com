<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meridian API — Final Logo</title>
<style>
body { background: #111; color: #ccc; font-family: -apple-system, sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 48px; }
h1 { font-size: 28px; color: #fff; }
.row { display: flex; gap: 48px; flex-wrap: wrap; justify-content: center; align-items: start; }
.card { text-align: center; }
.card h3 { margin: 16px 0 4px; font-size: 15px; color: #fff; }
.card p { font-size: 12px; color: #666; max-width: 200px; margin: 0 auto; }
.sizes { display: flex; gap: 20px; align-items: end; justify-content: center; margin-top: 8px; }
.sizes > div { text-align: center; }
.sizes .label { font-size: 11px; color: #555; margin-top: 4px; }
</style>
</head>
<body>

<h1>Meridian API — Final Logo (2 versions)</h1>

<div class="row">

  <!-- Garnet on White -->
  <div class="card">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="220" height="220">
      <rect width="200" height="200" rx="20" fill="#ffffff"/>
      <g fill="none" stroke="#8b2942" stroke-width="6.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 50 140 L 50 60 L 100 100 L 150 60 L 150 140"/>
      </g>
      <line x1="100" y1="50" x2="100" y2="156" stroke="#8b2942" stroke-width="3" stroke-linecap="round" opacity="0.35" stroke-dasharray="5 8"/>
      <circle cx="100" cy="40" r="6" fill="#8b2942" opacity="0.55"/>
      <text x="100" y="186" text-anchor="middle" fill="#8b2942" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="3" opacity="0.65">MERIDIAN</text>
    </svg>
    <h3>Garnet on White</h3>
    <p>For light backgrounds — docs, invoices, white UI.</p>

      <div>

          <rect width="200" height="200" rx="30" fill="#ffffff" stroke="#ddd" stroke-width="2"/>
          <g fill="none" stroke="#8b2942" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 50 140 L 50 60 L 100 100 L 150 60 L 150 140"/>
          </g>
          <line x1="100" y1="54" x2="100" y2="156" stroke="#8b2942" stroke-width="4" stroke-linecap="round" opacity="0.35" stroke-dasharray="6 10"/>
          <circle cx="100" cy="40" r="8" fill="#8b2942" opacity="0.6"/>
        </svg>
        <div class="label">64px</div>
      </div>
      <div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32">
          <rect width="200" height="200" rx="40" fill="#ffffff" stroke="#ddd" stroke-width="4"/>
          <g fill="none" stroke="#8b2942" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 50 140 L 50 60 L 100 100 L 150 60 L 150 140"/>
          </g>
          <line x1="100" y1="56" x2="100" y2="156" stroke="#8b2942" stroke-width="5" stroke-linecap="round" opacity="0.35" stroke-dasharray="7 12"/>
          <circle cx="100" cy="40" r="10" fill="#8b2942" opacity="0.7"/>
        </svg>
        <div class="label">32px</div>
      </div>
      <div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="16" height="16">
          <rect width="200" height="200" rx="40" fill="#ffffff" stroke="#ddd" stroke-width="6"/>
          <g fill="none" stroke="#8b2942" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 50 140 L 50 60 L 100 100 L 150 60 L 150 140"/>
          </g>
          <line x1="100" y1="60" x2="100" y2="156" stroke="#8b2942" stroke-width="7" stroke-linecap="round" opacity="0.35" stroke-dasharray="8 14"/>
          <circle cx="100" cy="40" r="14" fill="#8b2942" opacity="0.8"/>
        </svg>
        <div class="label">16px</div>
      </div>
    </div>
  </div>

      <rect width="200" height="200" rx="20" fill="#8b2942"/>

      <circle cx="100" cy="40" r="6" fill="#ffffff" opacity="0.5"/>
      <text x="100" y="186" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="3" opacity="0.6">MERIDIAN</text>
    </svg>
    <h3>White on Garnet</h3>
    <p>For dark backgrounds — site, social, branded contexts.</p>
    <div class="sizes">
      <div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="64" height="64">
          <rect width="200" height="200" rx="30" fill="#8b2942"/>
          <g fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 50 140 L 50 60 L 100 100 L 150 60 L 150 140"/>
          </g>
          <line x1="100" y1="54" x2="100" y2="156" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3" stroke-dasharray="6 10"/>
          <circle cx="100" cy="40" r="8" fill="#ffffff" opacity="0.6"/>
        </svg>

      </div>
      <div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32">
          <rect width="200" height="200" rx="40" fill="#8b2942"/>
          <g fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 50 140 L 50 60 L 100 100 L 150 60 L 150 140"/>
          </g>

      <div>

          <rect width="200" height="200" rx="40" fill="#8b2942"/>
          <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 50 140 L 50 60 L 100 100 L 150 60 L 150 140"/>
          </g>
          <line x1="100" y1="60" x2="100" y2="156" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.3" stroke-dasharray="8 14"/>

</div>

</body>
