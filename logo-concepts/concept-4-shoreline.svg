<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- ER initials with a single clean shoreline/ridge line underneath -->
  <rect width="200" height="200" rx="20" fill="#0d1210"/>
  <!-- ER — heavier weight, confident -->
  <g fill="none" stroke="#c8d4cc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- E -->
    <path d="M 48 60 L 48 120"/>
    <path d="M 48 60 L 82 60"/>
    <path d="M 48 90 L 74 90"/>
    <path d="M 48 120 L 82 120"/>
    <!-- R -->
    <path d="M 110 60 L 110 120"/>
    <path d="M 110 60 L 136 60 Q 150 60 150 76 Q 150 92 136 92 L 110 92"/>
    <path d="M 132 92 L 152 120"/>
  </g>
  <!-- Shoreline ridge — single flowing line -->
  <path d="M 30 148 Q 50 138 70 142 Q 90 146 100 140 Q 115 132 130 138 Q 148 145 170 142"
    fill="none" stroke="#c8d4cc" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
