<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eian Ray — Final Wordmark</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e8edf3; font-family: 'IBM Plex Sans', sans-serif; padding: 60px 48px; display: flex; flex-direction: column; gap: 32px; }
  .concept { border-radius: 16px; padding: 56px 48px; border: 1px solid #dde4ed; display: flex; align-items: center; }
  .concept.light { background: #ffffff; }
  .concept.dark { background: #0d1f2d; border-color: rgba(255,255,255,0.06); }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  .light .label { color: #b0bac8; }
  .dark .label { color: #2a3d52; }
</style>
</head>
<body>

<!-- Light -->
<div class="concept light">
  <div>
    <div class="label">R2 — Light</div>
    <div style="display:flex;align-items:center;gap:20px;">
      <svg width="58" height="58" viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Double ring — teal -->
        <circle cx="29" cy="29" r="27" stroke="#0a8a8a" stroke-width="1.5"/>
        <circle cx="29" cy="29" r="23.5" stroke="#0a8a8a" stroke-width="0.5" opacity="0.3"/>
        <!-- Cardinal ticks — teal -->
        <line x1="29" y1="2" x2="29" y2="7.5" stroke="#b03030" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="29" y1="50.5" x2="29" y2="56" stroke="#0a8a8a" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
        <line x1="2" y1="29" x2="7.5" y2="29" stroke="#0a8a8a" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
        <line x1="50.5" y1="29" x2="56" y2="29" stroke="#0a8a8a" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
        <!-- Intercardinal ticks — teal -->
        <line x1="10" y1="10" x2="12.5" y2="12.5" stroke="#0a8a8a" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="48" y1="10" x2="45.5" y2="12.5" stroke="#0a8a8a" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="10" y1="48" x2="12.5" y2="45.5" stroke="#0a8a8a" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="48" y1="48" x2="45.5" y2="45.5" stroke="#0a8a8a" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <!-- North needle — RED only -->
        <path d="M29 7.5 L32 29 L29 25 L26 29 Z" fill="#b03030"/>
        <!-- South needle — muted -->
        <path d="M29 50.5 L32 29 L29 33 L26 29 Z" fill="#c5ced9"/>
        <!-- Center ring + dot — teal -->
        <circle cx="29" cy="29" r="3.5" fill="none" stroke="#0a8a8a" stroke-width="1" opacity="0.5"/>
        <circle cx="29" cy="29" r="1.5" fill="#0d1f2d"/>
      </svg>
      <div>
        <div style="font-family:'IBM Plex Sans Condensed',sans-serif;font-size:34px;font-weight:700;color:#0d1f2d;text-transform:uppercase;line-height:1;letter-spacing:0.5px;">Eian Ray</div>
        <div style="font-size:10.5px;color:#0a8a8a;letter-spacing:3px;text-transform:uppercase;margin-top:8px;font-weight:600;">GIS Consulting &amp; Cartography</div>
      </div>
    </div>
  </div>
</div>

<!-- Dark -->
<div class="concept dark">
  <div>
    <div class="label">R2 — Dark</div>
    <div style="display:flex;align-items:center;gap:20px;">
      <svg width="58" height="58" viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Double ring — teal -->
        <circle cx="29" cy="29" r="27" stroke="#3dcccc" stroke-width="1.5"/>
        <circle cx="29" cy="29" r="23.5" stroke="#3dcccc" stroke-width="0.5" opacity="0.25"/>
        <!-- Cardinal ticks -->
        <line x1="29" y1="2" x2="29" y2="7.5" stroke="#e05050" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="29" y1="50.5" x2="29" y2="56" stroke="#3dcccc" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
        <line x1="2" y1="29" x2="7.5" y2="29" stroke="#3dcccc" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
        <line x1="50.5" y1="29" x2="56" y2="29" stroke="#3dcccc" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
        <!-- Intercardinal ticks — teal -->
        <line x1="10" y1="10" x2="12.5" y2="12.5" stroke="#3dcccc" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
        <line x1="48" y1="10" x2="45.5" y2="12.5" stroke="#3dcccc" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
        <line x1="10" y1="48" x2="12.5" y2="45.5" stroke="#3dcccc" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
        <line x1="48" y1="48" x2="45.5" y2="45.5" stroke="#3dcccc" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
        <!-- North needle — RED only -->
        <path d="M29 7.5 L32 29 L29 25 L26 29 Z" fill="#e05050"/>
        <!-- South needle — muted -->
        <path d="M29 50.5 L32 29 L29 33 L26 29 Z" fill="rgba(255,255,255,0.1)"/>
        <!-- Center ring + dot — teal -->
        <circle cx="29" cy="29" r="3.5" fill="none" stroke="#3dcccc" stroke-width="1" opacity="0.4"/>
        <circle cx="29" cy="29" r="1.5" fill="#3dcccc"/>
      </svg>
      <div>
        <div style="font-family:'IBM Plex Sans Condensed',sans-serif;font-size:34px;font-weight:700;color:#ffffff;text-transform:uppercase;line-height:1;letter-spacing:0.5px;">Eian Ray</div>
        <div style="font-size:10.5px;color:#3dcccc;letter-spacing:3px;text-transform:uppercase;margin-top:8px;font-weight:600;">GIS Consulting &amp; Cartography</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
